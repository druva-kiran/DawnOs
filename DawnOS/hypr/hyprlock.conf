# Source pywal colors
source = ~/.cache/wal/colors-hyprland.conf


general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.010
    contrast = 0.85
    brightness = 0.65
    vibrancy = 0.12
    vibrancy_darkness = 0.0
}

# ── AVATAR ────────────────────────────────────────────
image {
    monitor =
    path = $HOME/.face
    size = 90
    rounding = -1
    border_size = 2
    border_color = $color5
    position = 0, 220
    halign = center
    valign = center
    shadow_passes = 0
}

# ── CLOCK ─────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = $color7
    font_size = 80
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 0
}

# ── SECONDS ───────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%S") · $(date +"%p")"
    color = $color5
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, 28
    halign = center
    valign = center
    shadow_passes = 0

}

# ── DATE ──────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = $color6
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, 4
    halign = center
    valign = center
    shadow_passes = 0
}

# ── INPUT FIELD ───────────────────────────────────────
input-field {
    monitor =
    size = 260, 48
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = $color5
    inner_color = $color0
    font_color = $color7
    check_color = $color2
    fail_color = $color1
    fade_on_empty = false
    placeholder_text = Enter Password
    hide_input = false
    rounding = 999
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 0
}

# ── USER ──────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $color8
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 0, -118
    halign = center
    valign = center
    shadow_passes = 0
}

# ── CAPS LOCK ─────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | grep -q 1 && echo "󰌒  caps lock" || echo "")"
    color = $color3
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 0, -148
    halign = center
    valign = center
    shadow_passes = 0
}
