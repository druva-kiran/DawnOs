
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, kitty
bind = $mainMod, W, killactive,
bind = $mainMod, F, exec, kitty -e yazi 
bind = $mainMod, V, togglefloating,
bind = $mainMod, Space, exec, ~/.config/rofi/launchers/launcher.sh || pkill rofi
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle




# Walpaper Selector
bind = SUPER ALT, W, exec, ~/.config/rofi/Wallpicker/wall-picker.fish

# Lock Screen
bind = $mainMod, L, exec, /usr/bin/hyprlock

# Chromium Broweser
bind = SUPER, B, exec, google-chrome-stable

# Calculator button (XF86Calculator is the standard keysym)
bind = , XF86Calculator, exec, gnome-calculator

# Action Center
bind = $mainMod, N, exec, swaync-client -t -sw
bind = SUPER ALT, S, exec, eww -c ~/.config/eww/sidebar open --toggle sidebar

# Screenshot a region & Screenshot active window
bind = $mainMod, Print, exec, sh -c "hyprshot -m region --raw | satty -f -"
bind = , Print, exec, sh -c "hyprshot -m region --raw | satty -f -"

# ----- EWW Power Menu Binds -----
bind = SUPER ALT, Space, exec, eww -c ~/.config/eww/powermenu open powermenu
bind = SUPER ALT, Space, submap, powermenu

submap = powermenu
bind = , Escape, exec, eww -c ~/.config/eww/powermenu close powermenu
bind = , Escape, submap, reset

bind = SUPER ALT, Space, exec, eww -c ~/.config/eww/powermenu close powermenu
bind = SUPER ALT, Space, submap, reset
submap = reset



# --- Social & Communication (ALT + First Letter) ---
bind = ALT, X, exec, gtk-launch x.desktop
bind = ALT, D, exec, gtk-launch discord.desktop

# Existing ones for context:
bind = ALT, I, exec, gtk-launch instagram.desktop
bind = ALT, W, exec, gtk-launch whatsapp.desktop
bind = ALT, M, exec, gtk-launch gmail.desktop
bind = ALT, L, exec, gtk-launch linkedin.desktop
bind = ALT, Y, exec, gtk-launch youtube.desktop
bind = ALT, G, exec, gtk-launch github.desktop


# --- Music (ALT + S) ---
bind = ALT, S, exec, spotify

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


